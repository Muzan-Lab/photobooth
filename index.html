<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowBooth | Premium Web Photobooth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.3">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">BestBost<span>PHOTOBOOTH</span></div>
            <div id="sessionTimer" class="session-timer hidden">
                <span class="timer-label">SESSION TIME</span>
                <span id="timeLeft" class="timer-value">00:00</span>
            </div>
        </header>


        <main>
            <div class="photobooth-wrapper">
                <div class="camera-container" id="cameraContainer">
                    <video id="video" autoplay playsinline muted></video>
                    <div class="frame-overlay" id="frameOverlay"></div>
                    <div class="flash-effect" id="flashEffect"></div>
                    
                    <!-- New Photobooth Elements -->
                    <div class="countdown-overlay" id="countdown"></div>
                    <div class="shots-indicator hidden" id="shotsIndicator">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                    
                    <div class="camera-ui hidden">
                        <button id="captureBtn" class="main-capture-btn">
                            <div class="inner-circle"></div>
                        </button>
                        <button id="finishSessionBtn" class="secondary-btn finish-btn">FINISH</button>
                    </div>

                    <!-- Photo Gallery Reel -->
                    <div id="photoGallery" class="photo-gallery">
                        <div class="gallery-inner" id="galleryInner">
                            <!-- Thumbnails will be added here -->
                        </div>
                    </div>
                </div>

                <div class="controls-panel">
                    <section class="mode-selector">
                        <h3>SESSION MODE</h3>
                        <div class="mode-options">
                            <button class="mode-btn active" data-mode="strip">
                                <div class="mode-icon strip"></div>
                                <span>Strip (3)</span>
                            </button>
                            <button class="mode-btn" data-mode="single">
                                <div class="mode-icon single"></div>
                                <span>Single</span>
                            </button>
                        </div>
                    </section>

                    <section class="frame-selector">
                        <h3>SELECT FRAME</h3>
                        <div class="frames-grid">
                            <div class="frame-option active" data-frame="none">
                                <div class="frame-preview empty">None</div>
                                <span>Natural</span>
                            </div>
                            <div class="frame-option" data-frame="retro">
                                <div class="frame-preview"><img src="assets/frames/retro.png" alt="Retro"></div>
                                <span>Retro</span>
                            </div>
                            <div class="frame-option" data-frame="neon">
                                <div class="frame-preview"><img src="assets/frames/neon.png" alt="Neon"></div>
                                <span>Neon</span>
                            </div>
                            <div class="frame-option" data-frame="floral">
                                <div class="frame-preview"><img src="assets/frames/floral.png" alt="Floral"></div>
                                <span>Floral</span>
                            </div>
                            <div class="frame-option" data-frame="minimal">
                                <div class="frame-preview"><img src="assets/frames/minimal.png" alt="Minimal"></div>
                                <span>Minimal</span>
                            </div>
                        </div>
                    </section>

                    <div class="actions">
                        <button id="toggleCamera" class="secondary-btn">Switch Camera</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Hidden canvas for processing -->
        <canvas id="canvas" style="display:none;"></canvas>

        <footer>
            <p>&copy; 2026 GlowBooth Studio. All rights reserved.</p>
        </footer>
    </div>

    <!-- Session Setup Overlay -->
    <div id="setupScreen" class="setup-overlay active">
        <div class="setup-card">
            <h2>PHOTOBOX SESSION</h2>
            <div class="setup-grid">
                <div class="setup-group">
                    <label>Session Duration</label>
                    <div class="option-row" data-type="session">
                        <button class="opt-btn active" data-val="10">10m</button>
                        <button class="opt-btn" data-val="20">20m</button>
                        <button class="opt-btn" data-val="30">30m</button>
                    </div>
                </div>
                <div class="setup-group">
                    <label>Capture Countdown</label>
                    <div class="option-row" data-type="capture">
                        <button class="opt-btn" data-val="3">3s</button>
                        <button class="opt-btn active" data-val="5">5s</button>
                        <button class="opt-btn" data-val="10">10s</button>
                    </div>
                </div>
            </div>
            <button id="startSessionBtn" class="primary-btn">START SESSION</button>
        </div>
    </div>

    <!-- Result Preview Modal (Content injected dynamically) -->
    <div id="previewModal" class="modal">
        <div class="modal-content">
            <!-- Initialized and populated via script.js -->
        </div>
    </div>
    <script src="script.js?v=1.1"></script>
</body>
</html>
